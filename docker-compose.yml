services:
  postgres:
    image: postgres:16
    container_name: graphcrawl-pg
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: graphcrawl_test
    ports:
      - "5432:5432"
    volumes:
      - ./.pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10